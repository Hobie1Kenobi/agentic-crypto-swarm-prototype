# MCPize Configuration
# Docs: https://mcpize.com/docs/mcpize-yaml

version: 1

name: "agentic-crypto-swarm-prototype"
slug: "agentic-crypto-swarm-prototype"

runtime: python

build:
  install: "pip install -r packages/agents/requirements.txt"
  command: "python scripts/mcp_server.py --check"

start:
  type: http
  command: "python"
  args:
    - "scripts/mcp_server.py"
    - "--transport"
    - "streamable-http"
    - "--host"
    - "0.0.0.0"
